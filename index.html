<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Re:Act KR Jukebox (RKJ) - 세이로쿠 키라 Live Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- PapaParse CDN for robust CSV parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg-color: #0f172a;
      --panel-bg: #1e293b;
      --card-bg: #334155;
      --accent: #f43f5e;
      --accent-hover: #e11d48;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #475569;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 span.badge-header {
      background: var(--accent);
      color: #fff;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 500;
    }

    .main-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
    }

    @media (min-width: 900px) {
      .main-container {
        grid-template-columns: 1.2fr 0.8fr;
      }
    }

    /* Player Box */
    .player-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .player-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
      height: 0;
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    .player-container iframe, .player-container div#player {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .now-playing-card {
      background-color: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
    }

    .now-playing-date {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .now-playing-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .now-playing-artist {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Playlist Section */
    .playlist-section {
      background-color: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      height: 600px;
    }

    .search-filter-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background-color: var(--bg-color);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .lang-filters {
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background-color: var(--bg-color);
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active, .filter-btn:hover {
      background-color: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .playlist-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }

    .playlist-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .playlist-scroll::-webkit-scrollbar-thumb {
      background-color: var(--border);
      border-radius: 3px;
    }

    .song-card {
      padding: 12px 14px;
      border-radius: 8px;
      background-color: var(--bg-color);
      border: 1px solid transparent;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }

    .song-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .song-card.active {
      border-left: 4px solid var(--accent);
      background-color: #1e293b;
    }

    .song-info-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .song-info-main {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .song-info-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .song-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 6px;
      border-radius: 4px;
      background-color: var(--card-bg);
      color: #38bdf8;
    }

    .loading-state {
      text-align: center;
      padding: 40px 10px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      padding: 16px;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      background-color: var(--panel-bg);
    }
  </style>
</head>
<body>

  <header>
    <h1>Re:Act KR Jukebox <span class="badge-header">RKJ Live Sync</span></h1>
  </header>

  <div class="main-container">
    <!-- Player Section -->
    <div class="player-section">
      <div class="player-container">
        <div id="player"></div>
      </div>
      <div class="now-playing-card">
        <div class="now-playing-date" id="npDate">데이터 로딩 중...</div>
        <div class="now-playing-title" id="npTitle">구글 시트 연동 중...</div>
        <div class="now-playing-artist" id="npArtist">라이브 아카이브 플레이어</div>
      </div>
    </div>

    <!-- Playlist Section -->
    <div class="playlist-section">
      <div class="search-filter-box">
        <input type="text" id="searchInput" class="search-input" placeholder="곡명, 가수, 출처, 날짜, 특이사항 검색..." oninput="filterSongs()">
        <div class="lang-filters">
          <button class="filter-btn active" onclick="setLangFilter('ALL', this)">전체</button>
          <button class="filter-btn" onclick="setLangFilter('KO', this)">한식(KO)</button>
          <button class="filter-btn" onclick="setLangFilter('JA', this)">일식(JA)</button>
          <button class="filter-btn" onclick="setLangFilter('EN', this)">양식(EN)</button>
        </div>
      </div>
      <div class="playlist-scroll" id="playlist">
        <div class="loading-state">구글 시트에서 노래 데이터를 불러오는 중입니다... 🎵</div>
      </div>
    </div>
  </div>

  <footer>
    &copy; Re:Act KR Jukebox Project. Dynamic Google Sheets DB Connected.
  </footer>

  <script>
    // [구글 시트 CSV 게시 URL]
    const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRtj9gPbkqj8_BFhsa4G_8ifKB4OaATKlIoFMUS58E1lRNzL6g-ftU1RSRiTEqWpPtFTvnlQK5Xmq95/pub?output=csv';

    let songs = [];
    let player = null;
    let isPlayerReady = false;
    let currentIndex = 0;
    let currentLang = 'ALL';
    let timerCheck = null;
    let currentVideoId = null;

    // "HH:MM:SS" 또는 "MM:SS" 또는 초 단위 숫자를 초(sec) 수치로 정밀 변환하는 함수
    function timeToSeconds(timeStr) {
      if (!timeStr) return 0;
      if (typeof timeStr === 'number') return timeStr;
      
      const cleanStr = timeStr.toString().trim();
      if (!cleanStr) return 0;

      // 만약 이미 숫자만 들어있는 경우 (예: "513")
      if (/^\d+$/.test(cleanStr)) {
        return parseInt(cleanStr, 10);
      }

      const parts = cleanStr.split(':').map(val => parseInt(val.trim(), 10) || 0);
      if (parts.length === 3) {
        return parts[0] * 3600 + parts[1] * 60 + parts[2];
      } else if (parts.length === 2) {
        return parts[0] * 60 + parts[1];
      } else if (parts.length === 1) {
        return parts[0] || 0;
      }
      return 0;
    }

    // 날짜 포맷 정리 (예: 2025-10-10 -> 2025.10.10)
    function formatDate(dateStr, idStr) {
      if (dateStr && dateStr.trim()) {
        return dateStr.trim().replace(/-/g, '.');
      }
      if (idStr && idStr.length >= 8) {
        const year = idStr.substring(0, 4);
        const month = idStr.substring(4, 6);
        const day = idStr.substring(6, 8);
        return `${year}.${month}.${day}`;
      }
      return '';
    }

    window.addEventListener('DOMContentLoaded', () => {
      fetchGoogleSheetData();
    });

    // 구글 시트 CSV 데이터 비동기 로딩
    function fetchGoogleSheetData() {
      Papa.parse(GOOGLE_SHEET_CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          if (results.data && results.data.length > 0) {
            parseAndLoadSongs(results.data);
          } else {
            showError('구글 시트에서 데이터를 찾을 수 없습니다.');
          }
        },
        error: function(err) {
          console.error('CSV Load Error:', err);
          showError('구글 시트 데이터를 불러오는데 실패했습니다.');
        }
      });
    }

    // 13개 멸균 컬럼 스키마 매핑
    function parseAndLoadSongs(rawData) {
      songs = rawData.map((row, idx) => {
        const id = (row['id'] || '').trim();
        const title = (row['uniform_title'] || row['title_orig'] || '').trim();
        const titleOrig = (row['title_orig'] || '').trim();
        const artist = (row['uniform_artist'] || row['artist_orig'] || '').trim();
        const artistOrig = (row['artist_orig'] || '').trim();
        const work = (row['source_work'] || '').trim();
        const sourceType = (row['source_type'] || '').trim();
        const lang = (row['lang'] || 'JA').trim().toUpperCase();
        const dateRaw = (row['date'] || '').trim();
        const date = formatDate(dateRaw, id);
        const start = timeToSeconds(row['start_time']);
        const end = timeToSeconds(row['end_time']);
        const videoId = (row['video_id'] || '').trim();
        const note = (row['note'] || '').trim();

        return {
          id: id || `song_${idx}`,
          title: title,
          titleOrig: titleOrig,
          artist: artist,
          artistOrig: artistOrig,
          work: work,
          sourceType: sourceType,
          lang: lang,
          date: date,
          start: start,
          end: end,
          videoId: videoId,
          note: note
        };
      }).filter(s => s.videoId && s.title); // videoId와 title이 존재하는 데이터만 필터링

      if (songs.length === 0) {
        showError('유효한 노래 데이터가 없습니다.');
        return;
      }

      renderPlaylist();
      updateNowPlaying(0);
      loadYouTubeAPI();
    }

    function showError(msg) {
      document.getElementById('playlist').innerHTML = `<div class="loading-state" style="color:#f43f5e;">${msg}</div>`;
      document.getElementById('npTitle').innerText = '데이터 오류';
      document.getElementById('npDate').innerText = '';
    }

    function loadYouTubeAPI() {
      if (window.YT && window.YT.Player) {
        initPlayer();
      } else {
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
      }
    }

    window.onYouTubeIframeAPIReady = function() {
      initPlayer();
    };

    function initPlayer() {
      if (player || songs.length === 0) return;
      currentVideoId = songs[0].videoId;
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: songs[0].videoId,
        playerVars: { 
          'autoplay': 0, 
          'controls': 1,
          'start': songs[0].start
        },
        events: {
          'onReady': () => {
            isPlayerReady = true;
          },
          'onStateChange': onPlayerStateChange
        }
      });
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        if (currentIndex + 1 < songs.length) {
          playSong(currentIndex + 1);
        }
      }
    }

    function renderPlaylist() {
      const container = document.getElementById('playlist');
      const query = document.getElementById('searchInput').value.toLowerCase();
      container.innerHTML = '';

      songs.forEach((song, idx) => {
        const matchSearch = song.title.toLowerCase().includes(query) ||
                            song.titleOrig.toLowerCase().includes(query) ||
                            song.artist.toLowerCase().includes(query) ||
                            song.artistOrig.toLowerCase().includes(query) ||
                            song.work.toLowerCase().includes(query) ||
                            song.date.toLowerCase().includes(query) ||
                            song.note.toLowerCase().includes(query);
        const matchLang = (currentLang === 'ALL') || (song.lang === currentLang);

        if (matchSearch && matchLang) {
          const card = document.createElement('div');
          card.className = `song-card ${idx === currentIndex ? 'active' : ''}`;
          card.onclick = () => playSong(idx);
          card.innerHTML = `
            <div>
              <div class="song-info-date">${song.date}</div>
              <div class="song-info-main">${song.title}</div>
              <div class="song-info-sub">${song.artist}${song.work ? ' • ' + song.work : ''}</div>
            </div>
            <span class="song-badge">${song.lang}</span>
          `;
          container.appendChild(card);
        }
      });
    }

    function playSong(index) {
      currentIndex = index;
      const song = songs[index];
      renderPlaylist();
      updateNowPlaying(index);

      if (isPlayerReady && player) {
        if (currentVideoId === song.videoId && typeof player.seekTo === 'function') {
          player.seekTo(song.start, true);
          player.playVideo();
        } else if (typeof player.loadVideoById === 'function') {
          currentVideoId = song.videoId;
          player.loadVideoById({
            videoId: song.videoId,
            startSeconds: song.start
          });
        }
      } else {
        setTimeout(() => playSong(index), 300);
        return;
      }

      clearInterval(timerCheck);
      timerCheck = setInterval(() => {
        if (player && typeof player.getCurrentTime === 'function') {
          const currentTime = player.getCurrentTime();
          if (currentTime >= song.end && song.end > 0) {
            clearInterval(timerCheck);
            if (currentIndex + 1 < songs.length) {
              playSong(currentIndex + 1);
            }
          }
        }
      }, 250);
    }

    function updateNowPlaying(index) {
      const song = songs[index];
      if (!song) return;
      document.getElementById('npDate').innerText = song.date;
      document.getElementById('npTitle').innerText = song.title;
      document.getElementById('npArtist').innerText = `${song.artist}${song.work ? ' • ' + song.work : ''}`;
    }

    function filterSongs() {
      renderPlaylist();
    }

    function setLangFilter(lang, btn) {
      currentLang = lang;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPlaylist();
    }
  </script>
</body>
</html>
